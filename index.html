<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RollTrack — Material &amp; Garment Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#FAF7F1;
  --surface:#FFFFFF;
  --surface-alt:#F1ECE1;
  --kraft:#EDE3CD;
  --ink:#292420;
  --ink-soft:#6B6258;
  --ink-faint:#9C9286;
  --indigo:#28324C;
  --indigo-soft:#3C4A6E;
  --indigo-pale:#EDF0F6;
  --amber:#B97A2A;
  --amber-soft:#F1DAB1;
  --olive:#4F7858;
  --olive-pale:#E5EFE3;
  --rust:#AA3F33;
  --rust-pale:#F6E2DD;
  --line:#E3D9C6;
  --line-soft:#EEE7D8;
  --radius:10px;
  --shadow:0 1px 2px rgba(41,36,32,0.06), 0 6px 20px -8px rgba(41,36,32,0.12);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',-apple-system,sans-serif;
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Fraunces',serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
::selection{background:var(--amber-soft);}

/* ---------- layout ---------- */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:9999;}
#loader .spool{width:46px;height:46px;border-radius:50%;border:4px solid var(--line);border-top-color:var(--amber);animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loader p{color:var(--ink-soft);font-size:13px;letter-spacing:.02em;}

/* ---------- auth screen ---------- */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:9000;overflow-y:auto;}
.auth-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:30px 28px 26px;}
.auth-brand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:22px;text-align:center;}
.auth-brand .mark{width:40px;height:40px;}
.auth-brand .name{font-family:'Fraunces',serif;font-weight:600;font-size:20px;}
.auth-brand .tag{font-size:11.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;}
.auth-card h2{font-size:16px;margin:0 0 4px;}
.auth-card .sub{font-size:12.5px;color:var(--ink-soft);margin:0 0 18px;}
.auth-card .field{margin-bottom:13px;}
.auth-card .errbox{background:var(--rust-pale);color:var(--rust);font-size:12.5px;padding:9px 11px;border-radius:7px;margin-bottom:13px;}
.auth-card .btn{width:100%;justify-content:center;margin-top:4px;}
.auth-foot{text-align:center;font-size:11.5px;color:var(--ink-faint);margin-top:16px;}
.role-badge{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;padding:2px 7px;border-radius:999px;}
.role-badge.admin{background:#F1DAB1;color:#7A4F12;}
.role-badge.staff{background:rgba(255,255,255,0.14);color:#D8DEEC;}
.sidebar-user{padding:13px 20px;border-top:1px solid rgba(255,255,255,0.08);}
.sidebar-user .su-name{font-size:13px;font-weight:600;color:#fff;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.sidebar-user .su-logout{margin-top:9px;width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);color:#D8DEEC;border-radius:7px;padding:7px 10px;font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px;}
.sidebar-user .su-logout:hover{background:rgba(255,255,255,0.13);}

#shell{display:flex;min-height:100vh;}
#sidebar{
  width:230px;flex:0 0 230px;background:var(--indigo);color:#EDEFF4;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:10px;padding:22px 20px 16px;}
.brand .mark{width:30px;height:30px;flex:none;}
.brand .name{font-family:'Fraunces',serif;font-weight:600;font-size:17px;letter-spacing:.01em;}
.brand .sub{font-size:10.5px;color:#9FAAC4;letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}
nav.navlist{display:flex;flex-direction:column;padding:8px 12px;gap:2px;flex:1;}
nav.navlist .navitem{
  display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;
  color:#C7CEE0;font-size:13.5px;font-weight:500;text-decoration:none;border:none;background:none;width:100%;text-align:left;
}
nav.navlist .navitem svg{flex:none;opacity:.85;}
nav.navlist .navitem:hover{background:rgba(255,255,255,0.06);color:#fff;}
nav.navlist .navitem.active{background:rgba(255,255,255,0.12);color:#fff;}
nav.navlist .navitem.active svg{opacity:1;}
.sidebar-foot{padding:14px 20px 18px;font-size:11px;color:#8893AC;border-top:1px solid rgba(255,255,255,0.08);}

#main-wrap{flex:1;min-width:0;display:flex;flex-direction:column;}
#topbar{
  position:sticky;top:0;z-index:20;background:rgba(250,247,241,0.92);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
#topbar h1{font-size:21px;margin:0;font-weight:600;}
#topbar .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-faint);margin:0 0 2px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);padding:7px 12px;border-radius:999px;font-size:12.5px;color:var(--ink-soft);}
.chip strong{color:var(--ink);font-family:'IBM Plex Mono',monospace;font-weight:600;}
#main-content{padding:24px 28px 60px;max-width:1320px;width:100%;}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:8px;padding:9px 15px;font-size:13.5px;font-weight:600;border:1px solid transparent;transition:filter .12s;white-space:nowrap;}
.btn:hover{filter:brightness(0.96);}
.btn-primary{background:var(--indigo);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-ghost{background:transparent;border-color:var(--line);color:var(--ink);}
.btn-ghost:hover{background:var(--surface-alt);}
.btn-danger{background:var(--rust-pale);color:var(--rust);}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:7px;}
.btn[disabled]{opacity:.45;cursor:not-allowed;}
.btn-icon{padding:7px;border-radius:7px;background:transparent;border:1px solid var(--line);color:var(--ink-soft);}
.btn-icon:hover{background:var(--surface-alt);color:var(--ink);}

/* ---------- cards / kpi ---------- */
.grid{display:grid;gap:16px;}
.kpi-row{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
.kpi{padding:17px 18px;}
.kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);font-weight:600;}
.kpi .value{font-family:'Fraunces',serif;font-size:26px;font-weight:600;margin-top:6px;}
.kpi .sub{font-size:12px;color:var(--ink-soft);margin-top:3px;}
.kpi.warn .value{color:var(--rust);}
.section{padding:20px 22px;margin-bottom:18px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.section-head h2{font-size:16px;margin:0;font-weight:600;}
.section-head .hint{font-size:12px;color:var(--ink-faint);}

/* ---------- tables ---------- */
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);background:var(--surface-alt);padding:10px 14px;border-bottom:1px solid var(--line);white-space:nowrap;font-weight:600;}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#FCFAF5;}
td.num,th.num{text-align:right;font-family:'IBM Plex Mono',monospace;}
td .id{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12.5px;color:var(--indigo);}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;}
.badge-olive{background:var(--olive-pale);color:var(--olive);}
.badge-rust{background:var(--rust-pale);color:var(--rust);}
.badge-amber{background:var(--amber-soft);color:#7A4F12;}
.badge-grey{background:var(--surface-alt);color:var(--ink-soft);}

.empty{padding:46px 20px;text-align:center;color:var(--ink-soft);}
.empty .e-icon{margin:0 auto 12px;opacity:.5;}
.empty h3{margin:0 0 6px;font-size:15px;color:var(--ink);}
.empty p{margin:0 0 16px;font-size:13px;}

/* ---------- forms ---------- */
form .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 18px;}
form .form-grid.cols-3{grid-template-columns:repeat(3,1fr);}
.field{display:flex;flex-direction:column;gap:5px;}
.field.span2{grid-column:span 2;}
.field label{font-size:12px;font-weight:600;color:var(--ink-soft);}
.field .opt{font-weight:400;color:var(--ink-faint);}
.field input,.field select,.field textarea{
  border:1px solid var(--line);border-radius:7px;padding:9px 11px;background:var(--surface);color:var(--ink);width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--indigo-soft);outline-offset:1px;border-color:var(--indigo-soft);}
.field textarea{resize:vertical;min-height:60px;}
.field .readout{padding:9px 11px;background:var(--surface-alt);border-radius:7px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13.5px;border:1px solid var(--line);}
.form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);}
.inline-add{background:var(--indigo-pale);border:1px dashed #B9C3DC;border-radius:8px;padding:12px;margin-top:6px;}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.filters input,.filters select{border:1px solid var(--line);border-radius:7px;padding:7px 11px;background:var(--surface);font-size:13px;}
.helptext{font-size:11.5px;color:var(--ink-faint);margin-top:2px;}
.errtext{font-size:11.5px;color:var(--rust);margin-top:2px;}

/* ---------- modal ---------- */
#modal-root{position:fixed;inset:0;z-index:1000;pointer-events:none;}
#modal-root:empty{display:none;}
.modal-overlay{position:fixed;inset:0;background:rgba(35,31,26,0.45);display:flex;align-items:flex-start;justify-content:center;padding:5vh 16px;overflow-y:auto;pointer-events:auto;}
.modal-panel{background:var(--surface);border-radius:14px;max-width:620px;width:100%;box-shadow:0 20px 60px -10px rgba(0,0,0,0.3);}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);}
.modal-head h3{margin:0;font-size:16px;}
.modal-body{padding:20px 22px;}
.modal-body.tight{padding:0;}

/* ---------- tag (printable label) ---------- */
.tag-wrap{display:flex;justify-content:center;padding:10px 0 4px;}
.swing-tag{
  width:300px;background:var(--kraft);border:1.5px solid #D7C79E;border-radius:10px;padding:16px 16px 14px;position:relative;
  font-family:'IBM Plex Mono',monospace;
}
.swing-tag::before{
  content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:18px;height:18px;border-radius:50%;
  background:var(--bg);border:1.5px solid #D7C79E;
}
.swing-tag .t-store{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:#7A6B4A;text-align:center;margin-bottom:8px;}
.swing-tag .t-qr{display:flex;justify-content:center;margin:6px 0 10px;}
.swing-tag .t-qr svg,.swing-tag .t-qr img{width:150px;height:150px;}
.swing-tag .t-id{text-align:center;font-weight:600;font-size:14px;letter-spacing:.02em;margin-bottom:10px;}
.swing-tag .t-divider{border-top:1.5px dashed #C9B886;margin:8px 0;}
.swing-tag .t-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:#3E3424;}
.swing-tag .t-row span:first-child{color:#8A7A52;}

/* ---------- dashboard bars ---------- */
.bar-list{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:grid;grid-template-columns:120px 1fr 90px;align-items:center;gap:10px;font-size:12.5px;}
.bar-row .bar-bg{background:var(--surface-alt);border-radius:6px;height:10px;overflow:hidden;}
.bar-row .bar-fg{background:var(--amber);height:100%;border-radius:6px;}
.bar-row .bar-name{color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-row .bar-val{font-family:'IBM Plex Mono',monospace;text-align:right;color:var(--ink);}

.activity-list{display:flex;flex-direction:column;}
.activity-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line-soft);font-size:13px;}
.activity-row:last-child{border-bottom:none;}
.activity-row .a-main{display:flex;flex-direction:column;gap:2px;}
.activity-row .a-id{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-faint);}

/* ---------- two-col layout ---------- */
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;}
@media (max-width:980px){.two-col{grid-template-columns:1fr;} form .form-grid{grid-template-columns:1fr;} .field.span2{grid-column:span 1;}}

/* ---------- toast ---------- */
#toast-root{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:1100;pointer-events:none;}
.toast{background:var(--ink);color:#fff;padding:11px 16px;border-radius:8px;font-size:13px;box-shadow:var(--shadow);max-width:320px;}
.toast.err{background:var(--rust);}
.toast.ok{background:var(--olive);}

/* ---------- responsive ---------- */
@media (max-width:860px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .2s;z-index:500;}
  #sidebar.open{transform:translateX(0);}
  #main-content{padding:18px 14px 50px;}
  #topbar{padding:12px 14px;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
}
.menu-toggle{display:none;background:none;border:1px solid var(--line);border-radius:7px;padding:7px;}
@media (max-width:860px){.menu-toggle{display:inline-flex;}}

/* ---------- print ---------- */
#print-area{display:none;}
@media print{
  body *{visibility:hidden;}
  #print-area, #print-area *{visibility:visible;}
  #print-area{display:block !important;position:absolute;left:0;top:0;width:100%;}
  .print-tag-page{display:flex;flex-wrap:wrap;gap:14px;padding:14px;}
}
</style>
</head>
<body>

<div id="loader"><div class="spool"></div><p>Loading RollTrack…</p></div>

<div id="auth-screen" style="display:none;"></div>

<div id="shell" style="display:none;">
  <aside id="sidebar"></aside>
  <div id="main-wrap">
    <header id="topbar"></header>
    <main id="main-content"></main>
  </div>
</div>

<div id="modal-root"></div>
<div id="toast-root"></div>
<div id="print-area"></div>

<script>
/* ============================================================
   ROLLTRACK — Material Receiving, Stock & Garment Issue Tracker
   Single-file app. Data persisted via window.storage (shared).
   ============================================================ */

/* ---------- Supabase config ----------
   Fill these in from your Supabase project: Settings → API.
   SUPABASE_URL looks like https://xxxxxxxx.supabase.co
   SUPABASE_ANON_KEY is the long "anon public" key (safe to expose client-side —
   it only grants what the Row Level Security policies in supabase-setup.sql allow). */
const SUPABASE_URL = 'https://awfeicvcgwgxbfgflfww.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_7dniC8q00nwMJXJvCLvNEw_Tx4_pzvn';
const sb = (SUPABASE_URL.startsWith('http')) ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

/* ---------- session shim (personal, per-browser; works inside Claude
   artifacts via window.storage, degrades to in-memory-only elsewhere) ---------- */
const memoryStore = {};
const hasRealStorage = (typeof window.storage !== 'undefined' && window.storage);
const storageAPI = hasRealStorage ? window.storage : {
  async get(key){ if(!(key in memoryStore)) throw new Error('not found'); return {key, value: memoryStore[key]}; },
  async set(key, value){ memoryStore[key]=value; return {key, value}; },
  async delete(key){ delete memoryStore[key]; return {key, deleted:true}; },
  async list(prefix){ return {keys: Object.keys(memoryStore).filter(k=>!prefix||k.startsWith(prefix))}; }
};

/* ---------- app state ---------- */
const APP = {
  storeName: 'My Textile Store',
  lowStockThreshold: 50,
  nextBatchSeq: 1,
  nextIssueSeq: 1,
  suppliers: [],
  batches: [],
  issues: [],
  garments: [],
  users: [],
  currentUser: null,
  route: 'dashboard',
  loaded: false,
  filters: { stockSearch:'', stockCategory:'', stockSupplier:'', stockSource:'', lowOnly:false,
             repFrom:'', repTo:'',
             invGroupBy:'supplier', invSearch:'', invCategory:'', invSupplier:'' },
  prefillBatchId: null
};

const CATEGORIES = ['Cotton','Polyester','Viscose / Rayon','Denim','Knit / Jersey','Lace','Linen','Silk','Wool','Lining','Interlining','Trims & Accessories','Non-woven','Blended','Other'];
const QUALITIES = ['Grade A','Grade B','Grade C','First Quality','Second Quality','Stock Lot','Premium','Standard'];
const PURPOSES = ['Cutting','Sampling','Production','Other'];

/* ---------- helpers ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function num(v){ const n=parseFloat(v); return isNaN(n)?0:n; }
function fmtMoney(n){ return 'Rs. ' + (Number(n||0)).toLocaleString('en-LK',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtNum(n,dec){ dec=(dec==null?1:dec); return (Number(n||0)).toLocaleString('en-LK',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function fmtDate(d){ if(!d) return '—'; const dt=new Date(d+'T00:00:00'); if(isNaN(dt)) return d; return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function uid(prefix){ return prefix+'_'+Date.now().toString(36)+Math.floor(Math.random()*1000); }

function toast(msg, type){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast' + (type? ' '+type:'');
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2600);
}

function supplierName(id){ const s=APP.suppliers.find(x=>x.id===id); return s? s.name : '—'; }
function garmentLabel(id){ const g=APP.garments.find(x=>x.id===id); return g? (g.styleNo? g.styleNo+' — '+g.name : g.name) : null; }
function batchById(id){ return APP.batches.find(b=>b.id===id); }

function stockValue(b){ return (b.remainingMeters||0) * (b.pricePerMeter||0); }
function isLow(b){ return b.remainingMeters>0 && b.remainingMeters<=APP.lowStockThreshold; }
function isOut(b){ return b.remainingMeters<=0; }
function stockStatus(b){
  if(isOut(b)) return {label:'Out of stock', cls:'badge-rust'};
  if(isLow(b)) return {label:'Low stock', cls:'badge-amber'};
  return {label:'In stock', cls:'badge-olive'};
}

/* ---------- row <-> app-object mapping (DB uses snake_case, app uses camelCase) ---------- */
function rowToSupplier(r){ return {id:r.id, name:r.name, type:r.type, contact:r.contact||'', phone:r.phone||'', email:r.email||'', address:r.address||'', country:r.country||'', notes:r.notes||'', createdAt:new Date(r.created_at).getTime()}; }
function supplierToRow(s){ return {id:s.id, name:s.name, type:s.type, contact:s.contact||'', phone:s.phone||'', email:s.email||'', address:s.address||'', country:s.country||'', notes:s.notes||''}; }

function rowToBatch(r){ return {id:r.id, date:r.date, source:r.source, supplierId:r.supplier_id, category:r.category, materialType:r.material_type, color:r.color, design:r.design, quality:r.quality, gsm:r.gsm, invoiceNo:r.invoice_no, totalRolls:r.total_rolls, meterPerRoll:r.meter_per_roll, totalLength:r.total_length, pricePerMeter:r.price_per_meter, totalCost:r.total_cost, weightPerRoll:r.weight_per_roll, totalWeight:r.total_weight, remainingWeight:r.remaining_weight, remainingRolls:r.remaining_rolls, remainingMeters:r.remaining_meters, notes:r.notes||'', createdAt:new Date(r.created_at).getTime()}; }

function rpcRow(data){ return Array.isArray(data) ? data[0] : data; } // table-returning rpc() calls come back as an array

/* ---------- persistence (shared business data lives in Supabase/Postgres) ---------- */
async function loadAll(){
  if(!sb){
    toast('Supabase isn\u2019t configured yet — edit SUPABASE_URL / SUPABASE_ANON_KEY at the top of the file.', 'err');
    APP.loaded = true;
    return;
  }
  try{
    const [metaRes, supRes, batRes, issRes, garRes, usrRes] = await Promise.all([
      sb.from('app_meta').select('*').eq('id',1).maybeSingle(),
      sb.from('suppliers').select('*').order('created_at'),
      sb.from('batches').select('*').order('created_at'),
      sb.from('issues').select('*').order('created_at'),
      sb.from('garments').select('*').order('created_at'),
      sb.rpc('rpc_list_users')
    ]);
    if(metaRes.data){
      APP.storeName = metaRes.data.store_name || APP.storeName;
      APP.lowStockThreshold = (metaRes.data.low_stock_threshold!=null) ? metaRes.data.low_stock_threshold : APP.lowStockThreshold;
    }
    APP.suppliers = (supRes.data||[]).map(rowToSupplier);
    APP.batches = (batRes.data||[]).map(rowToBatch);
    APP.issues = (issRes.data||[]).map(rowToIssue);
    APP.garments = (garRes.data||[]).map(rowToGarment);
    APP.users = (usrRes.data||[]).map(rowToUser);
  }catch(e){
    console.error(e);
    toast('Could not reach the database. Check your Supabase URL/key and internet connection.', 'err');
  }
  APP.loaded = true;
}
async function saveMeta(){
  if(!sb) return;
  try{
    await sb.from('app_meta').update({store_name:APP.storeName, low_stock_threshold:APP.lowStockThreshold, updated_at:new Date().toISOString()}).eq('id',1);
  }catch(e){ toast('Could not sync settings to the database.', 'err'); }
}
function setupRealtime(){
  if(!sb) return;
  sb.channel('rolltrack-sync')
    .on('postgres_changes', {event:'*', schema:'public', table:'suppliers'}, async()=>{ const r=await sb.from('suppliers').select('*').order('created_at'); APP.suppliers=(r.data||[]).map(rowToSupplier); renderMain(); })
    .on('postgres_changes', {event:'*', schema:'public', table:'garments'}, async()=>{ const r=await sb.from('garments').select('*').order('created_at'); APP.garments=(r.data||[]).map(rowToGarment); renderMain(); })
    .on('postgres_changes', {event:'*', schema:'public', table:'batches'}, async()=>{ const r=await sb.from('batches').select('*').order('created_at'); APP.batches=(r.data||[]).map(rowToBatch); renderMain(); })
    .on('postgres_changes', {event:'*', schema:'public', table:'issues'}, async()=>{ const r=await sb.from('issues').select('*').order('created_at'); APP.issues=(r.data||[]).map(rowToIssue); renderMain(); })
    .subscribe();
}

/* ---------- session (personal, per-browser/account — not shared with other users) ---------- */
async function saveSession(userId){
  try{ await storageAPI.set('rt_session', JSON.stringify({userId}), false); }catch(e){ /* non-fatal */ }
}
async function clearSession(){
  try{ await storageAPI.delete('rt_session', false); }catch(e){ /* non-fatal */ }
}
async function restoreSession(){
  try{
    const r = await storageAPI.get('rt_session', false);
    const data = JSON.parse(r.value);
    const u = APP.users.find(x=>x.id===data.userId && x.active);
    if(u){ APP.currentUser = u; return true; }
  }catch(e){ /* no session */ }
  return false;
}

function setRoute(route, opts){
  const navItem = NAV.find(n=>n.id===route);
  if(navItem && navItem.adminOnly && (!APP.currentUser || APP.currentUser.role!=='admin')){
    toast('Only admins can access Users.', 'err');
    route = 'dashboard';
  }
  APP.route = route;
  APP.prefillBatchId = (opts && opts.batchId) || null;
  renderShell();
  window.scrollTo(0,0);
  const sb = document.getElementById('sidebar');
  if(sb) sb.classList.remove('open');
}

function renderShell(){
  document.getElementById('shell').style.display='flex';
  renderSidebar();
  renderTopbar();
  renderMain();
}

function renderSidebar(){
  const visibleNav = NAV.filter(n=> !n.adminOnly || (APP.currentUser && APP.currentUser.role==='admin'));

function renderTopbar(){
  const [title, sub] = PAGE_TITLE[APP.route] || ['',''];

   DASHBOARD
   ============================================================ */
function renderDashboard(){
  const totalValue = APP.batches.reduce((s,b)=>s+stockValue(b),0);
  const totalRolls = APP.batches.reduce((s,b)=>s+(b.remainingRolls||0),0);
  const totalMeters = APP.batches.reduce((s,b)=>s+(b.remainingMeters||0),0);
  const totalWeight = APP.batches.reduce((s,b)=>s+(b.remainingWeight||0),0);
  const activeBatches = APP.batches.filter(b=>!isOut(b)).length;
  const lowCount = APP.batches.filter(isLow).length;
  const outCount = APP.batches.filter(isOut).length;

  if(APP.batches.length===0){
    return `
    <div class="grid kpi-row">
      ${kpiCard('Stock Value','Rs. 0.00','Nothing received yet')}
      ${kpiCard('Rolls in Stock','0','—')}
      ${kpiCard('Suppliers',APP.suppliers.length,'')}
      ${kpiCard('Garment Styles',APP.garments.length,'')}
    </div>
    <div class="card empty">
      ${emptyIcon('inbox')}
      <h3>No material received yet</h3>
      <p>Start by logging your first shipment — you'll get a printable QR roll tag right away.</p>
      <button class="btn btn-primary" onclick="setRoute('receive')">${icon('plus',15)} Receive your first batch</button>
    </div>`;
  }

  const byCat = {};
  APP.batches.forEach(b=>{ byCat[b.category]=(byCat[b.category]||0)+stockValue(b); });
  const catRows = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const maxCat = Math.max(1, ...catRows.map(r=>r[1]));

  const recentBatches = [...APP.batches].sort((a,b)=>b.createdAt-a.createdAt).slice(0,5);
  const recentIssues = [...APP.issues].sort((a,b)=>b.createdAt-a.createdAt).slice(0,5);

  return `
  <div class="grid kpi-row">
    ${kpiCard('Total Stock Value', fmtMoney(totalValue), activeBatches+' active batches')}
    ${kpiCard('Rolls in Stock', fmtNum(totalRolls,0), fmtNum(totalMeters,1)+' m'+(totalWeight>0?' · '+fmtNum(totalWeight,1)+' kg':''))}
    ${kpiCard('Low Stock', lowCount, outCount+' out of stock', lowCount>0)}
    ${kpiCard('Suppliers', APP.suppliers.length, APP.garments.length+' garment styles')}
  </div>
  <div class="two-col">
    <div class="card section">
      <div class="section-head"><h2>Stock value by category</h2><span class="hint">remaining stock, current price</span></div>
      <div class="bar-list">
        ${catRows.map(([cat,val])=>`
          <div class="bar-row">
            <div class="bar-name">${esc(cat)}</div>
            <div class="bar-bg"><div class="bar-fg" style="width:${Math.max(4,(val/maxCat*100))}%"></div></div>
            <div class="bar-val">${fmtMoney(val)}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card section">
      <div class="section-head"><h2>Needs attention</h2></div>
      ${lowCount+outCount===0 ? `<p class="hint" style="color:var(--ink-soft)">Everything is comfortably stocked.</p>` :
        `<div class="activity-list">
          ${APP.batches.filter(b=>isLow(b)||isOut(b)).slice(0,6).map(b=>{
            const st = stockStatus(b);
            return `<div class="activity-row">
              <div class="a-main"><span>${esc(b.materialType)} · ${esc(b.color)}</span><span class="a-id">${b.id}</span></div>
              <span class="badge ${st.cls}">${st.label}</span>
            </div>`;
          }).join('')}
        </div>`}
    </div>
  </div>
  <div class="two-col" style="margin-top:18px;">
    <div class="card section">
      <div class="section-head"><h2>Recent receipts</h2><button class="btn btn-ghost btn-sm" onclick="setRoute('stock')">View all ${icon('arrowright',13)}</button></div>
      <div class="activity-list">
        ${recentBatches.map(b=>`<div class="activity-row">
          <div class="a-main"><span>${esc(b.materialType)} — ${esc(b.color)}</span><span class="a-id">${b.id} · ${fmtDate(b.date)}</span></div>
          <span class="mono">${fmtMoney(b.totalCost)}</span>
        </div>`).join('') || '<p class="hint">No receipts yet.</p>'}
      </div>
    </div>
    <div class="card section">
      <div class="section-head"><h2>Recent issues</h2><button class="btn btn-ghost btn-sm" onclick="setRoute('issue')">View all ${icon('arrowright',13)}</button></div>
      <div class="activity-list">
        ${recentIssues.map(i=>`<div class="activity-row">
          <div class="a-main"><span>${esc(i.garmentName)} ${i.styleNo?'('+esc(i.styleNo)+')':''}</span><span class="a-id">${i.id} · ${fmtDate(i.date)}</span></div>
          <span class="mono">${fmtNum(i.metersIssued,1)} m</span>
        </div>`).join('') || '<p class="hint">No issues yet.</p>'}
      </div>
    </div>
  </div>
  `;
}
function kpiCard(label,value,sub,warn){

}
function emptyIcon(name){ return `<div class="e-icon">${icon(name,40)}</div>`; }

function toggleInlineAdd(prefix){

function recalcReceive(){
  const rolls = num(document.getElementById('rf_rolls').value);
  const mpr = num(document.getElementById('rf_mpr').value);
  const price = num(document.getElementById('rf_price').value);
  const weightPerRoll = num(document.getElementById('rf_weight').value);
  const totalLen = rolls*mpr;
  const totalCost = totalLen*price;
  const totalWeight = rolls*weightPerRoll;
  document.getElementById('rf_total_len').textContent = fmtNum(totalLen,1)+' m';
  document.getElementById('rf_total_cost').textContent = fmtMoney(totalCost);
  document.getElementById('rf_total_weight').textContent = fmtNum(totalWeight,1)+' kg';
}
function resetReceiveForm(){ setRoute('receive'); }

async function handleReceiveSubmit(ev){
  ev.preventDefault();
  const supSel = document.getElementById('rf_supplier').value;
  let supplierId = supSel;
  if(supSel==='__new__'){
    const name = document.getElementById('rf_ns_name').value.trim();
    if(!name){ toast('Enter the new supplier name.','err'); return false; }
    const sup = {id:uid('sup'), name, type:'material', contact:'', phone:document.getElementById('rf_ns_phone').value.trim(), email:'', address:'', country:'', notes:''};
    const { error: supErr } = await sb.from('suppliers').insert(supplierToRow(sup));
    if(supErr){ toast('Could not save supplier: '+supErr.message,'err'); return false; }
    APP.suppliers.push(Object.assign({createdAt:Date.now()}, sup));
    supplierId = sup.id;
  }
  if(!supplierId){ toast('Please select or add a supplier.','err'); return false; }

  const rolls = num(document.getElementById('rf_rolls').value);
  const mpr = num(document.getElementById('rf_mpr').value);
  const price = num(document.getElementById('rf_price').value);
  const weightPerRoll = num(document.getElementById('rf_weight').value);
  if(rolls<=0 || mpr<=0){ toast('Rolls and meters per roll must be greater than zero.','err'); return false; }

  const gsmVal = document.getElementById('rf_gsm').value.trim();
  const { data, error } = await sb.rpc('rpc_receive_batch', {
    p_date: document.getElementById('rf_date').value || todayStr(),
    p_source: document.getElementById('rf_source').value,
    p_supplier_id: supplierId,
    p_category: document.getElementById('rf_category').value,
    p_material_type: document.getElementById('rf_type').value.trim(),
    p_color: document.getElementById('rf_color').value.trim(),
    p_design: document.getElementById('rf_design').value.trim(),
    p_quality: document.getElementById('rf_quality').value.trim(),
    p_gsm: gsmVal ? num(gsmVal) : null,
    p_invoice_no: document.getElementById('rf_invoice').value.trim(),
    p_total_rolls: rolls, p_meter_per_roll: mpr, p_price_per_meter: price,
    p_weight_per_roll: weightPerRoll,
    p_notes: document.getElementById('rf_notes').value.trim()
  });
  if(error){ toast('Could not save batch: '+error.message,'err'); return false; }
  const batch = rowToBatch(rpcRow(data));
  APP.batches.push(batch);
  toast('Batch '+batch.id+' saved.', 'ok');
  openPrintTag(batch.id);
  setRoute('stock');
  return false;
}

function exportInventorySummaryCSV(){
  const f = APP.filters;
  let rows = APP.batches.slice();
  if(f.invSearch){
    const q = f.invSearch.toLowerCase();
    rows = rows.filter(b => (b.id+' '+b.materialType+' '+b.color+' '+b.design+' '+supplierName(b.supplierId)).toLowerCase().includes(q));
  }
  if(f.invCategory) rows = rows.filter(b=>b.category===f.invCategory);
  if(f.invSupplier) rows = rows.filter(b=>b.supplierId===f.invSupplier);
  const groupDef = INV_GROUPS[f.invGroupBy] || INV_GROUPS.supplier;
  const groups = {};
  rows.forEach(b=>{
    const key = groupDef.keyOf(b);
    if(!groups[key]) groups[key] = {label: groupDef.labelOf(b), rolls:0, meters:0, weight:0, value:0, batchCount:0};
    const g = groups[key];
    g.rolls += b.remainingRolls||0; g.meters += b.remainingMeters||0; g.weight += b.remainingWeight||0; g.value += stockValue(b); g.batchCount += 1;
  });
  const out = [[groupDef.label,'Batches','Total Rolls','Total Meters','Total Weight (kg)','Stock Value (Rs.)']];
  Object.values(groups).sort((a,b)=>b.value-a.value).forEach(g=>{
    out.push([g.label, g.batchCount, g.rolls, g.meters.toFixed(1), g.weight.toFixed(1), g.value.toFixed(2)]);
  });
  exportCSV('inventory_summary_by_'+f.invGroupBy+'.csv', out);
}

async function handleIssueSubmit(ev){
  ev.preventDefault();
  const batchId = document.getElementById('if_batch').value;
  const b = batchById(batchId);
  if(!b){ toast('Select a material batch.','err'); return false; }
  const meters = num(document.getElementById('if_meters').value);
  const rolls = num(document.getElementById('if_rolls').value);
  if(meters<=0){ toast('Meters to issue must be greater than zero.','err'); return false; }
  if(meters > b.remainingMeters + 0.001){ toast('Only '+fmtNum(b.remainingMeters,1)+' m remaining in this batch.','err'); return false; }
  if(rolls > b.remainingRolls){ toast('Only '+b.remainingRolls+' rolls remaining in this batch.','err'); return false; }

  let garmentId = document.getElementById('if_garment').value;
  let garmentName, styleNo, garmentCategory;
  if(garmentId==='__new__'){
    const name = document.getElementById('if_ng_name').value.trim();
    if(!name){ toast('Enter the new garment name.','err'); return false; }
    const g = {id:uid('gar'), name, styleNo:document.getElementById('if_ng_style').value.trim(), category:document.getElementById('if_ng_cat').value.trim(), defaultConsumption:0, partyId:'', notes:''};
    const { error: garErr } = await sb.from('garments').insert(garmentToRow(g));
    if(garErr){ toast('Could not save garment: '+garErr.message,'err'); return false; }
    APP.garments.push(Object.assign({createdAt:Date.now()}, g));
    garmentId = g.id; garmentName=g.name; styleNo=g.styleNo; garmentCategory=g.category;
  } else if(garmentId){
    const g = APP.garments.find(x=>x.id===garmentId);
    garmentName=g.name; styleNo=g.styleNo; garmentCategory=g.category;
  } else {
    garmentId=''; garmentName='(Unspecified garment)'; styleNo=''; garmentCategory='';
  }

  let partyId = document.getElementById('if_party').value;
  if(partyId==='__new__'){
    const name = document.getElementById('if_ns_name').value.trim();
    if(name){
      const sup = {id:uid('sup'), name, type:'garment', contact:'', phone:document.getElementById('if_ns_phone').value.trim(), email:'', address:'', country:'', notes:''};
      const { error: supErr } = await sb.from('suppliers').insert(supplierToRow(sup));
      if(supErr){ toast('Could not save party: '+supErr.message,'err'); return false; }
      APP.suppliers.push(Object.assign({createdAt:Date.now()}, sup));
      partyId = sup.id;
    } else partyId='';
  }

  const qty = num(document.getElementById('if_qty').value);
  const { data, error } = await sb.rpc('rpc_issue_material', {
    p_batch_id: batchId,
    p_date: document.getElementById('if_date').value || todayStr(),
    p_meters: meters, p_rolls: rolls,
    p_garment_id: garmentId, p_garment_name: garmentName, p_style_no: styleNo, p_garment_category: garmentCategory,
    p_qty_garments: qty, p_party_id: partyId,
    p_purpose: document.getElementById('if_purpose').value,
    p_notes: document.getElementById('if_notes').value.trim()
  });
  if(error){ toast('Could not record issue: '+error.message,'err'); return false; }
  const issue = rowToIssue(rpcRow(data));
  APP.issues.push(issue);
  b.remainingMeters = Math.max(0, b.remainingMeters - meters);
  b.remainingRolls = Math.max(0, b.remainingRolls - rolls);
  b.remainingWeight = Math.max(0, (b.remainingWeight||0) - issue.weightIssued);
  toast('Issue '+issue.id+' recorded.', 'ok');
  setRoute('stock');
  return false;
}

async function saveUser(ev,id){
  ev.preventDefault();
  const displayName = document.getElementById('um_name').value.trim();
  const username = document.getElementById('um_username').value.trim().toLowerCase();
  const role = document.getElementById('um_role').value;
  const active = document.getElementById('um_active').value==='1';
  const password = document.getElementById('um_password').value;

  if(!displayName || !username){ toast('Name and username are required.','err'); return false; }
  if(!/^[a-z0-9._-]{3,}$/.test(username)){ toast('Username must be at least 3 characters (letters, numbers, dot, underscore, dash only).','err'); return false; }

  const existing = APP.users.find(x=>x.username===username && x.id!==id);
  if(existing){ toast('That username is already taken.','err'); return false; }

  if(id){
    const u = APP.users.find(x=>x.id===id);
    if(u.role==='admin' && (role!=='admin' || !active) && activeAdminCount()<=1){
      toast('You must keep at least one active admin.','err'); return false;
    }
    if(password && password.length<4){ toast('Password must be at least 4 characters.','err'); return false; }
    const { error } = await sb.rpc('rpc_update_user', {
      p_admin_id: APP.currentUser.id, p_user_id: id, p_display_name: displayName,
      p_role: role, p_active: active, p_password: password || null
    });
    if(error){ toast('Could not save user: '+error.message,'err'); return false; }
    u.displayName = displayName; u.role = role; u.active = active;
  } else {
    if(!password || password.length<4){ toast('Password must be at least 4 characters.','err'); return false; }
    const { data, error } = await sb.rpc('rpc_create_user', {
      p_admin_id: APP.currentUser.id, p_display_name: displayName, p_username: username,
      p_role: role, p_active: active, p_password: password
    });
    if(error){ toast('Could not create user: '+error.message,'err'); return false; }
    APP.users.push(rowToUser(rpcRow(data)));
  }
  closeModal();
  toast('User saved.','ok');
  renderMain();
  return false;
}

async function deleteUser(id){
  if(id===APP.currentUser.id){ toast('You cannot delete your own account while signed in.','err'); return; }
  const u = APP.users.find(x=>x.id===id);
  if(!u) return;
  if(u.role==='admin' && u.active && activeAdminCount()<=1){ toast('You must keep at least one active admin.','err'); return; }
  if(!confirm('Remove the account for '+u.displayName+'?')) return;
  const { error } = await sb.rpc('rpc_delete_user', { p_admin_id: APP.currentUser.id, p_user_id: id });
  if(error){ toast('Could not remove user: '+error.message,'err'); return; }
  APP.users = APP.users.filter(x=>x.id!==id);
  renderMain();
  toast('User removed.','ok');
}

/* ============================================================
   REPORTS
   ============================================================ */
function renderReportsPage(){
  const f = APP.filters;
  const from = f.repFrom, to = f.repTo;
  const inRange = (d) => (!from || d>=from) && (!to || d<=to);

  const receipts = APP.batches.filter(b=>inRange(b.date));
  const issuesInRange = APP.issues.filter(i=>inRange(i.date));

  const recvRolls = receipts.reduce((s,b)=>s+b.totalRolls,0);
  const recvMeters = receipts.reduce((s,b)=>s+b.totalLength,0);
  const recvCost = receipts.reduce((s,b)=>s+b.totalCost,0);

  const issMeters = issuesInRange.reduce((s,i)=>s+i.metersIssued,0);
  const issCost = issuesInRange.reduce((s,i)=>s+i.costOfMaterial,0);
  const issGarments = issuesInRange.reduce((s,i)=>s+i.qtyGarments,0);

  const totalStockValue = APP.batches.reduce((s,b)=>s+stockValue(b),0);
  const byCat = {};
  APP.batches.forEach(b=>{ byCat[b.category]=byCat[b.category]||{rolls:0,meters:0,weight:0,value:0}; byCat[b.category].rolls+=b.remainingRolls; byCat[b.category].meters+=b.remainingMeters; byCat[b.category].weight+=(b.remainingWeight||0); byCat[b.category].value+=stockValue(b); });

  const supplierRows = APP.suppliers.map(s=>{
    const sb = APP.batches.filter(b=>b.supplierId===s.id);
    const si = APP.issues.filter(i=>i.partyId===s.id);
    return {s, batchCount: sb.length, batchValue: sb.reduce((x,b)=>x+b.totalCost,0), issueCount: si.length, issueValue: si.reduce((x,i)=>x+i.costOfMaterial,0)};
  }).filter(r=>r.batchCount>0 || r.issueCount>0).sort((a,b)=>b.batchValue+b.issueValue-(a.batchValue+a.issueValue));

  const lowRows = APP.batches.filter(isLow);
  const outRows = APP.batches.filter(isOut);

  return `
  <div class="card section">
    <div class="section-head"><h2>Date range</h2><span class="hint">Applies to Receiving &amp; Issue reports below</span></div>
    <div class="filters">
      <input type="date" value="${from}" onchange="APP.filters.repFrom=this.value; renderMain();"> <span style="align-self:center;color:var(--ink-faint);">to</span>
      <input type="date" value="${to}" onchange="APP.filters.repTo=this.value; renderMain();">
      <button class="btn btn-ghost btn-sm" onclick="APP.filters.repFrom='';APP.filters.repTo=''; renderMain();">Clear range</button>
    </div>
  </div>

  <div class="grid kpi-row">
    ${kpiCard('Stock Value (current)', fmtMoney(totalStockValue), APP.batches.length+' batches on record')}
    ${kpiCard('Received in range', fmtNum(recvRolls,0)+' rolls', fmtNum(recvMeters,1)+' m · '+fmtMoney(recvCost))}
    ${kpiCard('Issued in range', fmtNum(issMeters,1)+' m', fmtMoney(issCost)+' · '+fmtNum(issGarments,0)+' garments')}
    ${kpiCard('Low / Out of stock', lowRows.length+outRows.length, lowRows.length+' low, '+outRows.length+' out', (lowRows.length+outRows.length)>0)}
  </div>

  <div class="card section">
    <div class="section-head"><h2>Stock valuation by category</h2>
      <button class="btn btn-ghost btn-sm" onclick="exportStockValuationCSV()">${icon('download',13)} Export CSV</button>
    </div>
    <div class="table-wrap"><table><thead><tr><th>Category</th><th class="num">Remaining rolls</th><th class="num">Remaining meters</th><th class="num">Remaining weight</th><th class="num">Stock value</th></tr></thead>
    <tbody>${Object.entries(byCat).length===0?`<tr><td colspan="5" style="text-align:center;color:var(--ink-faint);padding:20px;">No stock yet.</td></tr>`:
      Object.entries(byCat).sort((a,b)=>b[1].value-a[1].value).map(([c,v])=>`<tr><td>${esc(c)}</td><td class="num">${fmtNum(v.rolls,0)}</td><td class="num">${fmtNum(v.meters,1)}</td><td class="num">${v.weight>0?fmtNum(v.weight,1)+' kg':'—'}</td><td class="num">${fmtMoney(v.value)}</td></tr>`).join('')}

function currentReportRange(){
  const f = APP.filters;
  const inRange = (d) => (!f.repFrom || d>=f.repFrom) && (!f.repTo || d<=f.repTo);
  return inRange;
}
function exportStockValuationCSV(){
  const byCat = {};
  APP.batches.forEach(b=>{ byCat[b.category]=byCat[b.category]||{rolls:0,meters:0,weight:0,value:0}; byCat[b.category].rolls+=b.remainingRolls; byCat[b.category].meters+=b.remainingMeters; byCat[b.category].weight+=(b.remainingWeight||0); byCat[b.category].value+=stockValue(b); });
  const rows = [['Category','Remaining Rolls','Remaining Meters','Remaining Weight (kg)','Stock Value (Rs.)']];
  Object.entries(byCat).forEach(([c,v])=>rows.push([c, v.rolls, v.meters.toFixed(1), v.weight.toFixed(1), v.value.toFixed(2)]));
  exportCSV('stock_valuation.csv', rows);
}
function exportReceivingCSV(){
  const inRange = currentReportRange();
  const rows = [['Batch ID','Date','Source','Supplier','Material','Color','Design','GSM','Rolls','Total m','Weight (kg)','Price per m','Total Cost']];
  APP.batches.filter(b=>inRange(b.date)).forEach(b=>{
    rows.push([b.id, b.date, b.source, supplierName(b.supplierId), b.materialType, b.color, b.design||'', b.gsm!=null?b.gsm:'', b.totalRolls, b.totalLength.toFixed(1), b.totalWeight?b.totalWeight.toFixed(1):'', b.pricePerMeter.toFixed(2), b.totalCost.toFixed(2)]);
  });
  exportCSV('receiving_report.csv', rows);
}
function exportIssueCSV(){
  const inRange = currentReportRange();
  const rows = [['Issue ID','Date','Batch','Garment','Style No','Qty Garments','Meters Issued','Cost','Party']];
  APP.issues.filter(i=>inRange(i.date)).forEach(i=>{
    rows.push([i.id, i.date, i.batchId, i.garmentName, i.styleNo, i.qtyGarments, i.metersIssued.toFixed(1), i.costOfMaterial.toFixed(2), supplierName(i.partyId)]);
  });
  exportCSV('issue_report.csv', rows);
}
function exportSupplierCSV(){
  const rows = [['Supplier','Type','Batches Supplied','Material Value','Garments Issued To','Issue Value']];
  APP.suppliers.forEach(s=>{
    const sb = APP.batches.filter(b=>b.supplierId===s.id);
    const si = APP.issues.filter(i=>i.partyId===s.id);
    if(sb.length===0 && si.length===0) return;
    rows.push([s.name, s.type, sb.length, sb.reduce((x,b)=>x+b.totalCost,0).toFixed(2), si.length, si.reduce((x,i)=>x+i.costOfMaterial,0).toFixed(2)]);
  });
  exportCSV('supplier_summary.csv', rows);
}
function exportCSV(filename, rows){
  const csv = rows.map(r=>r.map(cell=>{
    const v = (cell==null?'':String(cell));
    return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
  }).join(',')).join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function buildQRMarkup(text, cellSize){
  if(typeof qrcode === 'undefined'){
    return `<div style="width:150px;height:150px;display:flex;align-items:center;justify-content:center;border:1px dashed #C9B886;font-size:10px;text-align:center;color:#8A7A52;">QR unavailable — batch ID: ${esc(text.split('\n')[0])}</div>`;
  }
  try{
    const qr = qrcode(0,'M');
    qr.addData(text);
    qr.make();
    return qr.createSvgTag({cellSize: cellSize||5, margin:2});
  }catch(e){
    return `<div style="font-size:10px;color:#8A7A52;">QR generation failed</div>`;
  }
}
function tagQRText(b){
  return 'Batch: '+b.id+'\n'+
         'Material: '+b.materialType+'\n'+
         'Color: '+b.color+(b.design?(' / '+b.design):'')+'\n'+
         (b.gsm!=null?('GSM: '+b.gsm+'\n'):'')+
         'Qty: '+b.totalRolls+' rolls x '+fmtNum(b.meterPerRoll,1)+'m'+(b.weightPerRoll?(' / '+fmtNum(b.weightPerRoll,1)+'kg'):'')+'\n'+
         'Supplier: '+supplierName(b.supplierId)+'\n'+
         'Date: '+fmtDate(b.date);
}
function swingTagHTML(b, qrMarkup){
  return `
  <div class="swing-tag">
    <div class="t-store">${esc(APP.storeName)}</div>
    <div class="t-qr">${qrMarkup}</div>
    <div class="t-id">${b.id}</div>
    <div class="t-divider"></div>
    <div class="t-row"><span>Material</span><span>${esc(b.materialType)}</span></div>
    <div class="t-row"><span>Color</span><span>${esc(b.color)}</span></div>
    ${b.design?`<div class="t-row"><span>Design</span><span>${esc(b.design)}</span></div>`:''}
    ${b.quality?`<div class="t-row"><span>Quality</span><span>${esc(b.quality)}</span></div>`:''}
    ${b.gsm!=null?`<div class="t-row"><span>GSM</span><span>${fmtNum(b.gsm,0)} g/m²</span></div>`:''}
    <div class="t-row"><span>Rolls</span><span>${b.totalRolls} x ${fmtNum(b.meterPerRoll,1)}m</span></div>
    ${b.weightPerRoll?`<div class="t-row"><span>Weight</span><span>${fmtNum(b.weightPerRoll,1)} kg/roll</span></div>`:''}
    <div class="t-row"><span>Supplier</span><span>${esc(supplierName(b.supplierId))}</span></div>
    <div class="t-row"><span>Received</span><span>${fmtDate(b.date)}</span></div>
  </div>`;
}
function openPrintTag(batchId){
  const b = batchById(batchId);
  if(!b) return;
  const qrMarkup = buildQRMarkup(tagQRText(b), 5);
  openModal(`
    <div class="modal-head"><h3>Roll tag — ${b.id}</h3><button class="btn-icon" onclick="closeModal()">${icon('close',16)}</button></div>
    <div class="modal-body">
      <div class="tag-wrap">${swingTagHTML(b, qrMarkup)}</div>
      <div class="form-grid" style="grid-template-columns:1fr auto;align-items:end;margin-top:14px;">
        <div class="field"><label>Number of copies to print</label><input type="number" min="1" step="1" id="pt_copies" value="${b.totalRolls}"></div>
        <button class="btn btn-primary" onclick="doPrintTags('${b.id}')">${icon('printer',15)} Print</button>
      </div>
      <p class="helptext">Print one tag per roll and stick it directly on the roll. Anyone scanning it sees the batch details instantly; staff can also look up "${b.id}" under Track / Lookup for live remaining stock.</p>
    </div>
  `);
}
function doPrintTags(batchId){
  const b = batchById(batchId);
  if(!b) return;
  const copies = Math.max(1, num(document.getElementById('pt_copies').value));
  const qrMarkup = buildQRMarkup(tagQRText(b), 5);
  let html = '<div class="print-tag-page">';
  for(let i=0;i<copies;i++){ html += swingTagHTML(b, qrMarkup); }
  html += '</div>';
  document.getElementById('print-area').innerHTML = html;
  setTimeout(()=>window.print(), 80);
}

async function handleBootstrapSubmit(ev){
  ev.preventDefault();
  const displayName = document.getElementById('bs_name').value.trim();
  const username = document.getElementById('bs_username').value.trim().toLowerCase();
  const p1 = document.getElementById('bs_password').value;
  const p2 = document.getElementById('bs_password2').value;
  const errBox = document.getElementById('auth-err');
  errBox.innerHTML='';
  if(!/^[a-z0-9._-]{3,}$/.test(username)){ errBox.innerHTML='<div class="errbox">Username must be at least 3 characters (letters, numbers, dot, underscore, dash only).</div>'; return false; }
  if(p1.length<4){ errBox.innerHTML='<div class="errbox">Password must be at least 4 characters.</div>'; return false; }
  if(p1!==p2){ errBox.innerHTML='<div class="errbox">Passwords do not match.</div>'; return false; }

  const { data, error } = await sb.rpc('rpc_bootstrap_admin', { p_display_name: displayName, p_username: username, p_password: p1 });
  if(error){ errBox.innerHTML = '<div class="errbox">'+esc(error.message)+'</div>'; return false; }
  const user = rowToUser(rpcRow(data));
  APP.users.push(user);
  APP.currentUser = user;
  await saveSession(user.id);
  hideAuthScreen();
  toast('Admin account created. Welcome, '+displayName+'.', 'ok');
  setRoute('dashboard');
  return false;
}

}
async function logout(){
  await clearSession();
  APP.currentUser = null;
  renderLoginScreen();
}
function renderConfigNeededScreen(){
  showAuthScreen(`
    <h2>Database not connected</h2>
    <p class="sub">This page can't reach Supabase yet.</p>
    <p class="helptext">Open this file, find <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> near the top of the &lt;script&gt; tag, and paste in the values from your Supabase project's Settings → API page. Then reload.</p>
  `);
}

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  await loadAll();
  document.getElementById('loader').style.display='none';

  if(!sb){
    renderConfigNeededScreen();
    return;
  }
  setupRealtime();
  if(APP.users.length===0){
    renderBootstrapScreen();
    return;
  }
  const restored = await restoreSession();
  if(restored){
    setRoute('dashboard');
  } else {
    renderLoginScreen();
  }
}
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
